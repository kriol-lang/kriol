name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends flex bison \
            clang-19 llvm-19 llvm-19-dev libgc-dev cmake xxd

      - name: Add LLVM 19 to PATH
        run: echo "/usr/lib/llvm-19/bin" >> $GITHUB_PATH

      - name: Clone submodules
        run: git submodule update --init

      - name: Build release
        run: |
          cmake -B build/release \
            -DCMAKE_BUILD_TYPE=Release \
            -DKRIOL_STATIC=ON \
            -DCMAKE_C_COMPILER=clang-19 \
            -DCMAKE_CXX_COMPILER=clang++-19

          cmake --build build/release --target check

      - name: Stage artifacts
        run: |
          STAGEDIR="kriol-${{ github.ref_name }}-linux-x86_64"
          mkdir -p "$STAGEDIR"
          cp build/release/kriol "$STAGEDIR/"

      - name: Pack archives
        run: |
          STAGEDIR="kriol-${{ github.ref_name }}-linux-x86_64"
          tar -czf "${STAGEDIR}.tar.gz" "$STAGEDIR"
          tar -cJf "${STAGEDIR}.tar.xz" "$STAGEDIR"

      - name: Generate checksums
        run: |
          sha256sum *.tar.gz *.tar.xz > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
          files: |
            kriol-${{ github.ref_name }}-linux-x86_64.tar.gz
            kriol-${{ github.ref_name }}-linux-x86_64.tar.xz
            SHA256SUMS
