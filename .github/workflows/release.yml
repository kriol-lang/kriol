name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends flex bison clang-19 llvm-19 llvm-19-dev libgc-dev

      - name: Add LLVM 19 to PATH
        run: echo "/usr/lib/llvm-19/bin" >> $GITHUB_PATH

      - name: Build release
        run: make clean && make release

      - name: Stage artifacts
        run: |
          STAGEDIR="kriol-${{ github.ref_name }}-linux-x86_64"
          mkdir -p "$STAGEDIR/runtime"
          cp kriol "$STAGEDIR/"
          cp runtime/kriol_runtime.o "$STAGEDIR/runtime/"

      - name: Pack archives
        run: |
          STAGEDIR="kriol-${{ github.ref_name }}-linux-x86_64"
          tar -czf "${STAGEDIR}.tar.gz" "$STAGEDIR"
          tar -cJf "${STAGEDIR}.tar.xz" "$STAGEDIR"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
          files: |
            kriol-${{ github.ref_name }}-linux-x86_64.tar.gz
            kriol-${{ github.ref_name }}-linux-x86_64.tar.xz
